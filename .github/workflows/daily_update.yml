name: Actualización Diaria Calendario Mundial 2026

on:
  schedule:
    # A las 06:00 UTC (08:00 AM hora peninsular española)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Instalar dependencias
        run: npm install
        
      - name: Generar calendario de hoy
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node mundial2026.js --today
        
      - name: Commit y Push de los cambios
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add mundial2026.ics
          git commit -m "📅 Actualización automática del calendario con noticias del día" || exit 0
          git push
