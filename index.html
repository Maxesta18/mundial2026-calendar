<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ VIP Porra - Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 25, 40, 0.6);
            --primary: #d4af37; /* Dorado premium */
            --primary-hover: #b5952f;
            --accent: #ff2a5f; /* Rosa Neón */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 42, 95, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 800;
            font-size: 36px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary), #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .porra-title { 
            font-size: 24px; 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 25px; 
            color: var(--primary); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .porra-form { display: flex; flex-direction: column; gap: 20px; }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .porra-input { 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0, 0, 0, 0.5); 
            color: #fff; 
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .porra-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .porra-scores { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .team-label {
            flex: 1;
            text-align: center;
            font-weight: 600;
            color: var(--text-muted);
        }

        .porra-score-input { 
            width: 80px; 
            text-align: center; 
            font-size: 32px; 
            font-weight: 800; 
            padding: 10px;
            color: var(--primary);
            background: rgba(0,0,0,0.8);
        }

        .porra-submit { 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); 
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .porra-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgba(212, 175, 55, 0.4);
        }

        .porra-submit:active {
            transform: translateY(0);
        }

        .calendar-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 600px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-google {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(16, 185, 129, 0.4); }

        .btn-apple {
            background: linear-gradient(135deg, #f8fafc, #cbd5e1);
            color: #0f172a;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-apple:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 255, 255, 0.2); }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .match-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .match-teams {
            font-size: 22px;
            font-weight: 800;
            margin: 15px 0;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .match-details {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .badge {
            background: rgba(212, 175, 55, 0.15);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        .leaderboard-item.rank-1 { background: rgba(212, 175, 55, 0.2); border-color: var(--primary); }
        .leaderboard-item.rank-2 { background: rgba(192, 192, 192, 0.1); border-color: #c0c0c0; }
        .leaderboard-item.rank-3 { background: rgba(205, 127, 50, 0.1); border-color: #cd7f32; }

        .rank-number { font-size: 18px; font-weight: 800; width: 30px; }
        .rank-name { flex: 1; text-align: left; margin-left: 10px; }
        .rank-points { color: var(--primary); font-size: 20px; font-weight: 800; }

        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            bottom: 40px;
        }

        .toast.error {
            background: var(--accent);
            box-shadow: 0 10px 30px rgba(255, 42, 95, 0.4);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Mundial 2026</h1>
        <p class="subtitle">Club de Apuestas Privado. Suscríbete al calendario de partidos y sella tu porra.</p>
    </div>

    <!-- CALENDARIO -->
    <div class="calendar-buttons">
        <a id="btnGoogle" href="https://calendar.google.com/calendar/render?cid=webcal://94.143.142.200/mundial2026.ics?v=4" class="btn btn-google" target="_blank">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Google Calendar
        </a>
        <a id="btnApple" href="webcal://94.143.142.200/mundial2026.ics?v=4" class="btn btn-apple">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2ZM11 19.938C7.054 19.444 4 16.082 4 12C4 7.918 7.054 4.556 11 4.062V19.938ZM13 4.062C16.946 4.556 20 7.918 20 12C20 16.082 16.946 19.444 13 19.938V4.062Z" /></svg>
            Apple / Outlook
        </a>
    </div>

    <div class="glass-panel">
        <div class="porra-title">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            LA PORRA OFICIAL
        </div>
        <form class="porra-form" id="porraForm">
            <div class="input-group">
                <label>Identificación</label>
                <input type="text" id="porraName" class="porra-input" placeholder="Tu nombre en el grupo..." required>
            </div>
            
            <div class="input-group">
                <label>Partido a Pronosticar</label>
                <select id="porraMatch" class="porra-input" required>
                    <option value="" disabled selected>Cargando partidos...</option>
                </select>
            </div>

            <div class="input-group">
                <label>Resultado Exacto</label>
                <div class="porra-scores">
                    <div class="team-label" id="labelHome">Local</div>
                    <input type="number" id="porraHome" class="porra-input porra-score-input" min="0" max="15" placeholder="0" required>
                    <span style="color: var(--text-muted); font-weight: 800;">-</span>
                    <input type="number" id="porraAway" class="porra-input porra-score-input" min="0" max="15" placeholder="0" required>
                    <div class="team-label" id="labelAway">Visitante</div>
                </div>
            </div>

            <button type="submit" class="porra-submit">Sellar Apuesta 🔒</button>
        </form>
    </div>

    <!-- CLASIFICACIÓN -->
    <div class="glass-panel" style="margin-top: 0;">
        <div class="porra-title">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
            CLASIFICACIÓN VIP
        </div>
        <div class="leaderboard-list" id="leaderboard-list">
            <p style="text-align:center; color: var(--text-muted); width: 100%;">Cargando ranking...</p>
        </div>
    </div>

    <div class="header-container" style="margin-bottom: 20px;">
        <h2 style="font-size: 24px; color: var(--text-main);">Próximos Partidos</h2>
    </div>

    <div id="matches-grid" class="matches-grid">
        <p style="text-align:center; color: var(--text-muted); width: 100%;">Sincronizando con la FIFA...</p>
    </div>

    <div id="toast" class="toast">Apuesta registrada con éxito</div>

    <script>
        let matchData = [];

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        document.getElementById('porraMatch').addEventListener('change', (e) => {
            const match = matchData.find(m => m.id == e.target.value);
            if(match) {
                document.getElementById('labelHome').textContent = match.home;
                document.getElementById('labelAway').textContent = match.away;
            }
        });

        fetch('matches.json')
            .then(res => res.json())
            .then(data => {
                matchData = data;
                const grid = document.getElementById('matches-grid');
                const select = document.getElementById('porraMatch');
                
                grid.innerHTML = '';
                select.innerHTML = '<option value="" disabled selected>Elige un partido...</option>';

                data.slice(0, 12).forEach(match => {
                    // Tarjetas
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    card.innerHTML = `
                        <div class="badge">${match.phase}</div>
                        <div class="match-details">🗓️ ${match.date} | ⏰ ${match.time}</div>
                        <div class="match-teams">${match.home} <br><span style="color:var(--primary)">vs</span><br> ${match.away}</div>
                        <div class="match-details">📍 ${match.venue}</div>
                    `;
                    grid.appendChild(card);

                    // Dropdown
                    const opt = document.createElement('option');
                    opt.value = match.id;
                    opt.textContent = `${match.home} vs ${match.away} (${match.date})`;
                    select.appendChild(opt);
                });
            })
            .catch(err => {
                document.getElementById('matches-grid').innerHTML = '<p style="text-align:center; color: var(--accent);">Error al cargar los partidos.</p>';
            });

        // Cargar clasificación
        fetch('/api/leaderboard')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                
                if (data.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color: var(--text-muted);">Aún no hay puntuaciones.</p>';
                    return;
                }

                data.forEach((user, index) => {
                    const item = document.createElement('div');
                    item.className = 'leaderboard-item' + (index < 3 ? ' rank-' + (index + 1) : '');
                    
                    let medal = '';
                    if (index === 0) medal = '🥇';
                    else if (index === 1) medal = '🥈';
                    else if (index === 2) medal = '🥉';

                    item.innerHTML = `
                        <div class="rank-number">${index + 1}º</div>
                        <div class="rank-name">${medal} ${user.name}</div>
                        <div class="rank-points">${user.total_points} pts</div>
                    `;
                    list.appendChild(item);
                });
            })
            .catch(err => {
                document.getElementById('leaderboard-list').innerHTML = '<p style="text-align:center; color: var(--accent);">Error al cargar la clasificación.</p>';
            });

        document.getElementById('porraForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Enviando...';
            btn.disabled = true;

            const payload = {
                name: document.getElementById('porraName').value,
                matchId: document.getElementById('porraMatch').value,
                homeScore: document.getElementById('porraHome').value,
                awayScore: document.getElementById('porraAway').value
            };

            try {
                // LLamada a API relativa (interceptada por Netlify Proxy hacia el VPS)
                const res = await fetch('/api/porra', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(res.ok) {
                    showToast('🏆 ¡Apuesta sellada con éxito!');
                    document.getElementById('porraHome').value = '';
                    document.getElementById('porraAway').value = '';
                } else {
                    showToast('Faltan datos', true);
                }
            } catch (err) { 
                showToast('❌ Error de conexión al servidor', true); 
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
